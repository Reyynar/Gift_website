<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 Surprise</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="effects"></div>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <h1>Will you continue? 💖</h1>
  <div class="row">
    <button id="yes1">💖 Yes</button>
    <button id="no1">🙈 No</button>
  </div>
  <div id="popup" class="popup hidden">🥺 I promise you’re going to love it.</div>
</div>

<!-- SCREEN 2 ENVELOPE -->
<div class="screen" id="s2">
  <div class="envelope" id="envelope">✉️</div>
  <p>Tap me</p>
</div>

<!-- SCREEN 3 GIFT -->
<div class="screen" id="s3">
  <div class="gift" id="gift">🎁</div>
</div>

<!-- SCREEN 4 LETTER -->
<div class="screen" id="s4">
  <div class="card">
    <h2>💌 Dear Saad,</h2>
    <p id="letter"></p>
  </div>
</div>

<!-- SCREEN 5 FINAL -->
<div class="screen" id="s5">
  <div class="card">
    <h2>Wait… 😂</h2>
    <p id="finalText"></p>
    <button id="finalBtn">Click me 😂</button>
    <div class="row">
      <button id="yes2">😁 Yes</button>
      <button id="no2">🙄 No</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
