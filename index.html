<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#ff9a9e,#fad0c4);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
            color:white;
        }

        .card{
            background:rgba(255,255,255,0.15);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            max-width:600px;
        }

        h1{
            font-size:40px;
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:30px;
            background:white;
            color:#ff4b7d;
            font-size:18px;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            transform:scale(1.05);
        }

        #letter{
            display:none;
            margin-top:20px;
            font-size:20px;
            line-height:1.6;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>❤️ For Someone Very Special ❤️</h1>

    <p>I made this little website just for you.</p>

    <button onclick="showLetter()">
        Open My Letter 💌
    </button>

    <div id="letter">
        <p>
            Dear Love,<br><br>

            Every day with you is a gift. Thank you for making my life brighter,
            happier, and more beautiful. I hope this little surprise makes you smile.
            ❤️<br><br>

            Love Always.
        </p>
    </div>
</div>

<script>
function showLetter(){
    document.getElementById("letter").style.display="block";
}
</script>

</body>
</html>
